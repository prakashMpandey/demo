
name: Deploy nodejs application to gcp

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: deploy via ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.SSH_HOST}}
          username: kakarot
          key: ${{secrets.SSH_KEY}}
          script: |
            cd /home/ashritapandey685/demo
            git pull
            docker compose up -d --build
